services:
  - type: web
    name: maison-lin-fabric
    env: python
    plan: free
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && gunicorn -b 0.0.0.0:$PORT app:app
    envVars:
      - key: FLASK_DEBUG
        value: "0"
      - key: FLASK_ENV
        value: production
      # Add a Render PostgreSQL database, then link DATABASE_URL in the dashboard
      # or uncomment and use fromDatabase below:
      # - key: DATABASE_URL
      #   fromDatabase:
      #     name: maison-lin-db
      #     property: connectionString
